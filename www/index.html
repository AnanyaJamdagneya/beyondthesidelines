/* ===================================================================== *
 *  DATE HELPERS
 * ===================================================================== */
const pad = (n) => String(n).padStart(2, '0');
const toISO = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const fromISO = (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const today = () => startOfDay(new Date());
const todayISO = () => toISO(today());
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const daysAgoISO = (n) => toISO(addDays(today(), -n));
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function prettyDate(iso) {
  const d = fromISO(iso), t = today();
  const diff = Math.round((startOfDay(d) - t) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === -1) return 'Yesterday';
  if (diff === 1) return 'Tomorrow';
  return `${DOW[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function longDate(iso) { const d = fromISO(iso); return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }
function shortDate(iso) { const d = fromISO(iso); return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`; }

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function buildSeedJournal(seedNum, mode) {
  const rand = mulberry32(seedNum);
  // ~40 days back (so the trend view zooms out to weekly), honest gaps, recent streak ending yesterday.
  const skip = new Set([34, 27, 22, 12]);
  const entries = {};
  const target = [2.0, 2.4, 2.8, 3.2, 3.6, 4.0]; // rising weekly mean over ~6 weeks
  for (let ago = 40; ago >= 1; ago--) {
    if (skip.has(ago) && ago > 8) continue;
    const wk = Math.min(target.length - 1, Math.floor((40 - ago) / 7));
    let m = Math.round(Math.max(1, Math.min(5, target[wk] + (rand() - 0.5) * 1.8)));
    const pain = Math.max(1, Math.min(5, 6 - m + (rand() < 0.3 ? 1 : 0)));
    const pool = NOTE_POOL[m];
    const text = pool[Math.floor(rand() * pool.length)];
    const win = rand() < 0.45 ? WIN_POOL[Math.floor(rand() * WIN_POOL.length)] : '';
    entries[daysAgoISO(ago)] = { mood: m, pain, text, win, updatedAt: Date.now() - ago * 86400000 };
  }
  return entries;
}
function buildSeedSessions(seedNum) {
  const rand = mulberry32(seedNum + 7);
  const log = {};
  for (let ago = 26; ago >= 1; ago--) {
    if (rand() < 0.78) {
      const total = 5;
      const completed = rand() < 0.8 ? 5 : 3 + Math.floor(rand() * 2);
      // Pain easing over the weeks (≈5 → ≈2) with honest day-to-day wobble.
      const pain = Math.max(0, Math.min(10, Math.round(5 - ((26 - ago) / 26) * 3 + (rand() - 0.5) * 2)));
      log[daysAgoISO(ago)] = { completed, total, minutes: 14 + Math.floor(rand() * 8), pain, sent: true };
    }
  }
  return log;
}

function emptyAccount({ name, email, mode } = {}) {
  // Plan starts EMPTY, a self-guided user builds their own; a PT/center plan is
  // assigned at the end of onboarding. role: 'patient' (default) | 'therapist'.
  return { role: 'patient', name: name || '', email: email || '', mode: mode || 'self', center: null, centerCode: null,
    onboarded: false, profile: null, plan: [], journal: {}, sessions: {}, progress: {},
    careNotes: [], pinned: [], seenNotes: [], goals: [], graduated: [], reportPref: 'concerns', createdAt: Date.now() };

// A friendly, shareable connection code for a therapist, e.g. "SUNNY-PT-4821".
function genCode(clinic) {
  // Clinic-name prefix + 5 random chars (no ambiguous 0/O/1/I) = ~33M combos per prefix,
  // so two therapists at the same clinic — or clinics with the same name — get different codes.
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const base = String(clinic || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 5);
  let rand = '';
  for (let i = 0; i < 5; i++) rand += chars[Math.floor(Math.random() * chars.length)];
  return (base || 'CLINIC') + '-' + rand;
}

const LS = {
  get(k, d) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? d : v; } catch (e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
  del(k) { try { localStorage.removeItem(k); } catch (e) {} },
};
const mkErr = (code) => { const e = new Error(code); e.code = code; return e; };

/* device-only fallback, used until Firebase keys are filled in */
const LocalBackend = {
  _cb: null,
  onAuth(cb) {
    this._cb = cb;
    const uid = LS.get('bts.session', null);
    const users = LS.get('bts.users', {});
    const rec = uid ? Object.values(users).find((u) => u.uid === uid) : null;
    cb(rec ? { uid: rec.uid, email: rec.email, name: rec.name } : null);
  },
  async signUpEmail(name, email, pw) {
    const users = LS.get('bts.users', {}); const key = email.trim().toLowerCase();
    if (users[key]) throw mkErr('auth/email-already-in-use');
    if ((pw || '').length < 6) throw mkErr('auth/weak-password');
    const uid = 'u' + Date.now() + Math.floor(Math.random() * 1000);
    users[key] = { uid, email: email.trim(), name, pw }; LS.set('bts.users', users); LS.set('bts.session', uid);
    const u = { uid, email: email.trim(), name }; this._cb && this._cb(u); return u;
  },
  async signInEmail(email, pw) {
    const users = LS.get('bts.users', {}); const rec = users[email.trim().toLowerCase()];
    if (!rec) throw mkErr('auth/user-not-found');
    if (rec.pw !== pw) throw mkErr('auth/wrong-password');
    LS.set('bts.session', rec.uid);
    const u = { uid: rec.uid, email: rec.email, name: rec.name }; this._cb && this._cb(u); return u;
  },
  async signInGoogle() { throw mkErr('no-google'); },
  async signInApple() { throw mkErr('no-apple'); },
  async resetPassword() { throw mkErr('no-reset'); },
  async signOut() { LS.set('bts.session', null); this._cb && this._cb(null); },
  async loadData(uid) { return LS.get('bts.data.' + uid, null); },
  async saveData(uid, account) { LS.set('bts.data.' + uid, account); },
  async deleteData(uid) { LS.del('bts.data.' + uid); },
  async loadLink(code) { return LS.get('bts.link.' + code, null); },
  async saveLink(code, link) { LS.set('bts.link.' + code, link); },
  // Live channel: re-read on cross-tab storage events + a light poll, so PT↔patient messages sync.
  subscribeLink(code, cb) {
    const read = () => { try { cb(LS.get('bts.link.' + code, null)); } catch (e) {} };
    read();
    const onStorage = (e) => { if (!e || e.key === 'bts.link.' + code) read(); };
    window.addEventListener('storage', onStorage);
    const t = setInterval(read, 2500);
    return () => { window.removeEventListener('storage', onStorage); clearInterval(t); };
  },
};

/* real auth + Firestore sync */
let _fa = null, _fd = null;
const FirebaseBackend = {
  _init() {
    if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
    _fa = firebase.auth(); _fd = firebase.firestore();
  },
  onAuth(cb) {
    this._init();
    _fa.onAuthStateChanged((u) => cb(u ? { uid: u.uid, email: u.email || '', name: u.displayName || '', photo: u.photoURL || '' } : null));
  },
  async signUpEmail(name, email, pw) {
    const cred = await _fa.createUserWithEmailAndPassword(email.trim(), pw);
    if (name) { try { await cred.user.updateProfile({ displayName: name }); } catch (e) {} }
    return { uid: cred.user.uid, email: cred.user.email, name };
  },
  async signInEmail(email, pw) {
    const cred = await _fa.signInWithEmailAndPassword(email.trim(), pw);
    return { uid: cred.user.uid, email: cred.user.email, name: cred.user.displayName || '' };
  },
  async resetPassword(email) { await _fa.sendPasswordResetEmail(email.trim()); },
  async signInGoogle() {
    // On the phone app a popup can't open, so use the native Google sign-in plugin to get a
    // Google credential, then sign the JS SDK in with it (so Firestore sync uses the same account).
    if (isNative()) {
      const FA = nativePlugin('FirebaseAuthentication');
      if (!FA) throw mkErr('no-google');
      const res = await FA.signInWithGoogle();
      const c = (res && res.credential) || {};
      const gcred = firebase.auth.GoogleAuthProvider.credential(c.idToken, c.accessToken);
      const cred = await _fa.signInWithCredential(gcred);
      return { uid: cred.user.uid, email: cred.user.email, name: cred.user.displayName || (res.user && res.user.displayName) || '' };
    }
    const cred = await _fa.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    return { uid: cred.user.uid, email: cred.user.email, name: cred.user.displayName || '' };
  },
  async signInApple() {
    // Apple requires this once you offer any third-party sign-in. Native uses the Apple plugin
    // to get a credential, then signs the JS SDK in with it so Firestore uses the same account.
    if (isNative()) {
      const FA = nativePlugin('FirebaseAuthentication');
      if (!FA) throw mkErr('no-apple');
      const res = await FA.signInWithApple();
      const c = (res && res.credential) || {};
      const acred = new firebase.auth.OAuthProvider('apple.com').credential({ idToken: c.idToken, rawNonce: c.nonce });
      const cred = await _fa.signInWithCredential(acred);
      return { uid: cred.user.uid, email: cred.user.email, name: cred.user.displayName || (res.user && res.user.displayName) || '' };
    }
    const cred = await _fa.signInWithPopup(new firebase.auth.OAuthProvider('apple.com'));
    return { uid: cred.user.uid, email: cred.user.email, name: cred.user.displayName || '' };
  },
  async signOut() { await _fa.signOut(); },
  async loadData(uid) {
    const snap = await _fd.collection('users').doc(uid).get();
    if (!snap.exists) return null;
    const d = snap.data();
    if (d && typeof d.data === 'string') { try { return JSON.parse(d.data); } catch (e) { return null; } }
    return null;
  },
  async saveData(uid, account) {
    await _fd.collection('users').doc(uid).set({ data: JSON.stringify(account), email: account.email || '', updatedAt: Date.now() });
  },
  async deleteData(uid) { try { await _fd.collection('users').doc(uid).delete(); } catch (e) {} },
  async loadLink(code) {
    const snap = await _fd.collection('links').doc(code).get();
    if (!snap.exists) return null;
    const d = snap.data();
    if (d && typeof d.data === 'string') { try { return JSON.parse(d.data); } catch (e) { return null; } }
    return null;
  },
  async saveLink(code, link) {
    await _fd.collection('links').doc(code).set({ data: JSON.stringify(link), updatedAt: Date.now() });
  },
  // Live channel: Firestore pushes every change to the connection doc, so PT↔patient
  // messages, plans, and notes appear in real time without a manual refresh.
  subscribeLink(code, cb) {
    this._init();
    return _fd.collection('links').doc(code).onSnapshot((snap) => {
      if (!snap || !snap.exists) { cb(null); return; }
      const d = snap.data();
      if (d && typeof d.data === 'string') { try { cb(JSON.parse(d.data)); return; } catch (e) {} }
      cb(null);
    }, () => {});
  },
};

const backend = FB_READY ? FirebaseBackend : LocalBackend;

const Store = createContext(null);

function StoreProvider({ children }) {

  const [authReady, setAuthReady] = useState(false);

  const [authError, setAuthError] = useState('');
  const saveTimer = useRef(null);

  const applyLink = useCallback((l) => { linkRef.current = l; setLink(l); }, []);
  const commitLink = useCallback(async (l) => { applyLink(l); try { await backend.saveLink(l.code, l); } catch (e) {} }, [applyLink]);

  useEffect(() => {
    let mounted = true;
    backend.onAuth(async (user) => {
      if (!mounted) return;
      if (!user) { uidRef.current = null; setAccount(null); applyLink(null); setAuthReady(true); return; }
      uidRef.current = user.uid;
      let data = null;
      try { data = await backend.loadData(user.uid); } catch (e) {}
      const pendingName = (typeof window !== 'undefined' && window.__btsSignupName) || '';

      // Keep the name from the provider (Google/Apple) or the name just typed at signup,
      // backfilling older accounts. On email signup the provider displayName isn't set yet

        window.__btsTherapistSignup = null;
        // Guarantee the code isn't already taken (regenerate on the rare collision).
        let code = genCode(clinic);
        for (let i = 0; i < 6; i++) {
          let existing = null;
          try { existing = await backend.loadLink(code); } catch (e) {}
          if (!existing) break;
          code = genCode(clinic);
        }
        acct = { ...acct, role: 'therapist', clinic, code, onboarded: true };
        try { await backend.saveLink(code, { code, therapistUid: user.uid, therapistName: user.name || acct.name, clinic, createdAt: Date.now(), patients: {} }); } catch (e) {}
        try { await backend.saveData(user.uid, acct); } catch (e) {}
      }
      if (!mounted) return;
      setAccount(acct); setAuthReady(true);
      // Load the relevant connection doc.
      try {
        if (acct.role === 'therapist' && acct.code) applyLink(await backend.loadLink(acct.code));
        else if (acct.centerCode) applyLink(await backend.loadLink(acct.centerCode));
        else applyLink(null);
      } catch (e) { applyLink(null); }
      const h = window.location.hash.replace(/^#/, '') || '/';
      if (['/', '/login', '/signup', '/join', '/pt-signup'].includes(h)) {
        go(acct.role === 'therapist' ? '/pt' : (acct.onboarded ? '/today' : '/onboarding'));
      }
    });
    return () => { mounted = false; };
  }, []);

  // Live channel: subscribe to the shared connection doc so PT↔patient messages, plans, and
  // notes update in real time on both sides (no manual refresh).
  useEffect(() => {
    if (!account || account.demo || !backend.subscribeLink) return;
    const code = account.role === 'therapist' ? account.code : account.centerCode;
    if (!code) return;
    const unsub = backend.subscribeLink(code, (l) => { if (l) applyLink(l); });
    return () => { try { unsub && unsub(); } catch (e) {} };
  }, [account && account.role, account && account.code, account && account.centerCode, account && account.demo, applyLink]);

  const save = useCallback((next) => {
    if (!next || next.demo || !uidRef.current) return;
    const id = uidRef.current;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { backend.saveData(id, next).catch(() => {}); }, 500);
  }, []);
  const patch = useCallback((fn) => { setAccount((prev) => { if (!prev) return prev; const next = fn(prev); save(next); return next; }); }, [save]);

  // The patient's own entry inside the shared link (their PT-assigned plan/notes).
  const me = (account && account.role === 'patient' && account.centerCode && link && link.patients) ? (link.patients[uidRef.current] || null) : null;
  const careNotes = account
    ? (me ? (me.notes || []).map((n) => ({ ...n, from: n.from || (link && link.therapistName) || 'Your therapist', role: n.role || (link && link.clinic) || 'Your PT center' }))

    : [];

    const l = linkRef.current; if (!l || !l.patients || !l.patients[patientUid]) return;
    const np = fn({ ...l.patients[patientUid] });
    commitLink({ ...l, patients: { ...l.patients, [patientUid]: np } });

  const api = useMemo(() => ({
    account, link, ptPatient: me, careNotes, session: !!account, authReady, busy, authError, fbReady: FB_READY,
    clearAuthError: () => setAuthError(''),
    async refreshLink() {
      if (!account || account.demo) return; // demo link lives in memory only
      const code = account.role === 'therapist' ? account.code : account.centerCode;
      if (!code) return;
      try { applyLink(await backend.loadLink(code)); } catch (e) {}
    },

    async signUpEmail(name, email, pw) {
      window.__btsSignupName = (name || '').trim();
      setAuthError(''); setBusy(true);
      try { await backend.signUpEmail(name, email, pw); }
      catch (e) { setAuthError(humanizeAuthError(e)); throw e; }
      finally { setBusy(false); }
    },
    async signUpTherapist(name, clinic, email, pw) {
      window.__btsTherapistSignup = { clinic };
      window.__btsSignupName = (name || '').trim();

/* derived helpers */
function streakOf(journal) {
  let count = 0; let cursor = today();
  if (!journal[toISO(cursor)]) cursor = addDays(cursor, -1);
  while (journal[toISO(cursor)]) { count++; cursor = addDays(cursor, -1); }
  return count;
}
function bestStreakOf(journal) {
  const dates = Object.keys(journal).sort();
  if (!dates.length) return 0;
  let best = 1, run = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = fromISO(dates[i - 1]), cur = fromISO(dates[i]);
    if (Math.round((cur - prev) / 86400000) === 1) { run++; best = Math.max(best, run); } else run = 1;
  }
  return best;
}

function useRoute() {
  const [route, setRoute] = useState(() => window.location.hash.replace(/^#/, '') || '/');
  useEffect(() => {
    const on = () => setRoute(window.location.hash.replace(/^#/, '') || '/');
    window.addEventListener('hashchange', on);
    return () => window.removeEventListener('hashchange', on);
  }, []);
  return route;
}
function go(path) { window.location.hash = path; }

      if (isTherapist) { await signUpTherapist(name.trim(), clinic.trim(), email, pw); return; }

  const google = async () => {

function Onboarding() {
  const { account, completeOnboarding, setDisplayName } = useStore();
  const joinCode = window.__btsJoinCode || null;
  const startMode = account.mode || (joinCode ? 'center' : 'self');

  const [step, setStep] = useState(0);
  const [name, setName] = useState(account.name || '');
  const firstName = (name || account.name || 'there').trim().split(' ')[0];
  const [track, setTrack] = useState('physical');
  const [injuryKey, setInjuryKey] = useState('knee');
  const [detail, setDetail] = useState('');
  const [side, setSide] = useState('');
  const [constraints, setConstraints] = useState([]);
  const [goals, setGoals] = useState([]);
  const [goalInput, setGoalInput] = useState('');
  const [milestones, setMilestones] = useState([]);
  const [msInput, setMsInput] = useState('');
  const [mode, setMode] = useState(startMode);
  const [code, setCode] = useState(joinCode || '');

  const mental = track === 'mental';
  const FOCUS_LIST = mental ? MENTAL_FOCUSES : INJURIES;
  const injury = FOCUS_LIST.find((i) => i.key === injuryKey) || FOCUS_LIST[0];
  const sided = !mental && ['knee','ankle','shoulder','hip','wrist'].includes(injuryKey);
  const otherKey = mental ? 'mgeneral' : 'other';
  // Switching track resets the focus selection to that track's first option.
  const chooseTrack = (t) => { if (t === track) return; setTrack(t); setInjuryKey((t === 'mental' ? MENTAL_FOCUSES : INJURIES)[0].key); setSide(''); setConstraints([]); };

  const toggle = (arr, set, v) => set(arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);
  const addGoal = (text) => { const t = text.trim(); if (t && !goals.includes(t)) setGoals([...goals, t]); setGoalInput(''); };
  const addMs = () => { const t = msInput.trim(); if (t) setMilestones([...milestones, { id: 'ms' + Date.now(), label: t, done: false, doneISO: null }]); setMsInput(''); };
  // Seed the Road Back checkpoints from the chosen focus (re-seeds if they change it).
  useEffect(() => { setMilestones(mkMilestones(injuryKey)); }, [injuryKey]);

  const STEPS = ['Welcome', mental ? 'Your focus' : 'Your injury', mental ? "What's hard" : 'Your limits', 'Your goals', mental ? 'Your steps' : 'Your road back', 'How you’ll use it'];
  const pct = ((step + 1) / STEPS.length) * 100;

  const finish = () => {
    const cap = (s) => s ? s[0].toUpperCase() + s.slice(1) : '';
    const injuryLabel = injury.key === otherKey
      ? (detail.trim() || (mental ? 'Mental wellness' : 'Recovery'))
      : (side ? `${cap(side)} ${injury.label.toLowerCase()}` : injury.label);
    const profile = {
      injuryKey, injuryLabel, track,
      side, detail, phase: 'Getting started', startISO: todayISO(),
      constraints,
    };
    const goalObjs = goals.map((t, i) => ({ id: 'g' + i + Date.now(), text: t, done: false }));
    const center = mode === 'center' ? (DEMO_CENTERS[code.toUpperCase()] || 'Your PT center') : null;
    setDisplayName(name);
    completeOnboarding(profile, goalObjs, { mode, center, code: code.toUpperCase() }, milestones);
    window.__btsJoinCode = null;
    go('/today');
  };

  const next = () => setStep((s) => Math.min(STEPS.length - 1, s + 1));
  const back = () => setStep((s) => Math.max(0, s - 1));

  return (
    <div className="ob-wrap">
      <div className="ob-bar"><div className="ob-bar-fill" style={{ width: pct + '%' }} /></div>
      <div className="ob-body">
        <div className="ob-step" key={step}>
          {step === 0 && (
            <div>
              <Logo variant="mark" size={48} style={{ marginBottom:20 }} />
              <h1 className="ob-title">Welcome{firstName && firstName !== 'there' ? `, ${firstName}` : ''}.</h1>
              <p className="ob-sub">Let’s set up your recovery space. A few quick questions so today’s page fits where you actually are, your injury, what you can’t do yet, and what you’re working toward.</p>
              <Input label="What should we call you?" iconLeft={<Icon name="user" size={16}/>} placeholder="First name is fine" value={name} onChange={(e)=>setName(e.target.value)} style={{ marginBottom:14 }} />
              <Card variant="soft" style={{ marginBottom:8 }}>
                <div className="row" style={{ gap:12 }}><Icon name="lock" size={18} style={{ color:'var(--brand)' }} /><span style={{ fontSize:'var(--text-sm)', color:'var(--text-body)' }}>This takes about a minute, and you can change any of it later.</span></div>
              </Card>
              <div className="ob-foot"><span/><Button variant="primary" size="lg" disabled={!name.trim()} onClick={() => { setDisplayName(name); next(); }} iconRight={<Icon name="arrow-right" size={18}/>}>Let’s begin</Button></div>
            </div>
          )}
          {step === 1 && (
            <div>
              <span className="ob-eyebrow"><Icon name="activity" size={14}/> Step 1 of 5</span>
              <h1 className="ob-title">What brings you here?</h1>
              <p className="ob-sub">Beyond the Sidelines works for the body and the mind. Pick what fits, you can have both over time.</p>
              <div className="col" style={{ gap:12, marginBottom:22 }}>
                <div className="mode-card" data-on={!mental} onClick={() => chooseTrack('physical')}>
                  <span className="mode-ic" style={{ background:'var(--apricot-100)', color:'var(--apricot-700)' }}><Icon name="activity" size={22}/></span>
                  <div><div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'var(--text-md)', color:'var(--text-strong)' }}>Physical recovery</div><div className="muted" style={{ fontSize:'var(--text-sm)' }}>An injury, surgery, or pain you’re rehabbing.</div></div>
                </div>
                <div className="mode-card" data-on={mental} onClick={() => chooseTrack('mental')}>
                  <span className="mode-ic" style={{ background:'var(--sky-100)', color:'var(--sky-700)' }}><Icon name="heart" size={22}/></span>
                  <div><div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'var(--text-md)', color:'var(--text-strong)' }}>Mental wellness</div><div className="muted" style={{ fontSize:'var(--text-sm)' }}>Anxiety, stress, low mood, sleep, and more.</div></div>
                </div>
              </div>
              <div className="field-label" style={{ marginBottom:10 }}>{mental ? 'What are you focusing on?' : 'And the area closest to your injury?'}</div>

function greetingWord() { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'; }

function ReminderWatcher() {
  const { account } = useStore();
  const times = (account && account.reminderTimes && account.reminderTimes.length)
    ? account.reminderTimes
    : ((account && account.reminderTime) ? [account.reminderTime] : []);
  const key = times.join(',');
  // Native app: schedule real repeating daily phone notifications (fire even when closed).
  useEffect(() => {
    if (!isNative()) return;
    if (times.length) scheduleNativeReminders(times); else cancelNativeReminders();
  }, [key]);
  // Web fallback: nudge while the tab is open, once per time per day.
  useEffect(() => {
    if (isNative() || !times.length) return;
    const check = () => {
      try {
        const now = new Date(); const todayKey = todayISO();
        times.forEach((t) => {
          const [h, m] = t.split(':').map(Number);
          const due = now.getHours() > h || (now.getHours() === h && now.getMinutes() >= m);
          const stamp = 'bts.reminded.' + t;
          if (due && localStorage.getItem(stamp) !== todayKey) {
            localStorage.setItem(stamp, todayKey);
            if (window.Notification && Notification.permission === 'granted') {
              new Notification('Beyond the Sidelines', { body: 'A gentle nudge — time for your exercises and a quick check-in.' });
            }
          }
        });
      } catch (e) {}
    };
    check();
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, [key]);
  return null;
}
// Gentle, dismissible "install this to your home screen" coach — most people don't know
// the trick. Web only, hidden once installed or dismissed. Real one-tap Install on Android/desktop.
function InstallPrompt() {
  const [show, setShow] = useState(false);
  const [deferred, setDeferred] = useState(null);
  const [ios, setIos] = useState(false);
  useEffect(() => {
    if (isNative()) return;
    const standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone;
    if (standalone) return;
    try { if (localStorage.getItem('bts.installDismissed')) return; } catch (e) {}
    const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    setIos(isiOS);
    const onBip = (e) => { e.preventDefault(); setDeferred(e); setShow(true); };
    window.addEventListener('beforeinstallprompt', onBip);
    let t; if (isiOS) t = setTimeout(() => setShow(true), 2000);
    return () => { window.removeEventListener('beforeinstallprompt', onBip); if (t) clearTimeout(t); };
  }, []);
  if (!show) return null;
  const dismiss = () => { setShow(false); try { localStorage.setItem('bts.installDismissed', '1'); } catch (e) {} };
  const install = async () => { if (deferred) { try { deferred.prompt(); await deferred.userChoice; } catch (e) {} } dismiss(); };
  const ShareGlyph = () => (
    <svg width="13" height="16" viewBox="0 0 14 18" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={{ verticalAlign: '-2px', margin: '0 2px' }}>
      <path d="M7 2v9" /><path d="M4.2 4.6 7 1.8l2.8 2.8" /><path d="M3.5 7.5H2.2v8.3h9.6V7.5h-1.3" />
    </svg>
  );
  return (
    <div style={{ position: 'fixed', left: '50%', transform: 'translateX(-50%)', bottom: 'calc(env(safe-area-inset-bottom, 0px) + 20px)', zIndex: 300, width: 'min(440px, calc(100vw - 24px))' }}>
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', boxShadow: '0 12px 40px rgba(40,30,20,0.18)', padding: '14px 16px', display: 'flex', gap: 12, alignItems: 'center' }}>
        <span className="report-ic" style={{ flex: '0 0 auto' }}><Icon name="plus" size={20} /></span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, color: 'var(--text-strong)', fontSize: 'var(--text-sm)' }}>Add this to your home screen</div>
          {ios
            ? <div className="muted" style={{ fontSize: 'var(--text-xs)', lineHeight: 1.5 }}>In Safari, tap <strong>Share</strong><ShareGlyph />then <strong>“Add to Home Screen.”</strong> Opens like a real app.</div>
            : <div className="muted" style={{ fontSize: 'var(--text-xs)', lineHeight: 1.5 }}>One tap to install — quick access and reminders, no app store.</div>}
        </div>
        {!ios && deferred && <Button variant="primary" size="sm" onClick={install}>Install</Button>}
        <button onClick={dismiss} title="Not now" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-subtle)', display: 'inline-flex', padding: 4, flex: '0 0 auto' }}><Icon name="x" size={16} /></button>
      </div>
    </div>
  );
}

function MusicControls() {
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState('off'); // off | calm | focus | hype | file | embed
  const [fileName, setFileName] = useState('');
  const [linkInput, setLinkInput] = useState('');
  const [embed, setEmbed] = useState(null); // { kind, src, height }
  const [linkErr, setLinkErr] = useState('');
  const audioRef = useRef(null);
  const ambientRef = useRef(null);
  const urlRef = useRef(null);

  const stopAll = () => {
    if (audioRef.current) audioRef.current.pause();
    if (ambientRef.current) { ambientRef.current.stop(); ambientRef.current = null; }
    setEmbed(null);
  };
  useEffect(() => () => { stopAll(); if (urlRef.current) URL.revokeObjectURL(urlRef.current); }, []);

  const pickVibe = (v) => { stopAll(); ambientRef.current = startAmbient(v); setMode(v); };
  const turnOff = () => { stopAll(); setMode('off'); };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0]; e.target.value = '';
    if (!f) return;

function SessionPlayer({ items, startProgress, onSetDone, onFeedback, onClose, onDone }) {

  const [ex, setEx] = useState(initial.ex);
  const [setIdx, setSetIdx] = useState(initial.set);
  const [secs, setSecs] = useState(0);
  const [running, setRunning] = useState(false);
  const cur = items[ex];
  const total = items.length;

  const totalSets = items.reduce((a, e) => a + e.sets, 0);
  const setsDone = items.slice(0, ex).reduce((a, e) => a + e.sets, 0) + setIdx + (phase === 'done' ? cur.sets : 0);
  const progPct = Math.min(100, Math.round((setsDone / totalSets) * 100));

  const begin = (ei, si) => { const e = items[ei]; setEx(ei); setSetIdx(si); setPhase('work'); if (e.type === 'hold') { setSecs(e.holdSec); setRunning(true); } else { setRunning(false); } };
  const completeSet = () => { onSetDone(cur.id, setIdx + 1); if (setIdx + 1 < cur.sets) { setPhase('rest'); setSecs(cur.restSec); setRunning(true); } else { setRunning(false); setPhase('feedback'); } };

  useEffect(() => { if (!running) return; const id = setInterval(() => setSecs((s) => Math.max(0, s - 1)), 1000); return () => clearInterval(id); }, [running]);

  const totalSecs = phase === 'rest' ? cur.restSec : (cur.type === 'hold' ? cur.holdSec : 1);
  const frac = totalSecs ? secs / totalSecs : 0;
  const ringColor = phase === 'rest' ? 'var(--sage-500)' : 'var(--brand)';
  const showRing = phase === 'work' || phase === 'rest';

    <div className="player-ring-wrap">
      <svg className="player-ring" width="100%" height="100%" viewBox="0 0 260 260">
        <circle cx="130" cy="130" r={R} fill="none" stroke="var(--surface-sunken)" strokeWidth="14" />
        {animate && <circle cx="130" cy="130" r={R} fill="none" stroke={ringColor} strokeWidth="14" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - frac)} style={{ transition: 'stroke-dashoffset 1s linear' }} />}
      </svg>
      <div className="player-ring-num">{children}</div>
    </div>
  );

  return (
    <div className="player">
      <div className="player-top">
        <button className="icon-btn" onClick={onClose}><Icon name="x" size={18} /></button>
        <div className="player-prog"><div style={{ width: progPct + '%' }} /></div>
        <span className="muted" style={{ fontSize: 'var(--text-sm)', fontWeight: 700 }}>{progPct}%</span>
        <MusicControls />
      </div>

      {phase === 'intro' && (
        <div className="player-body">
          <span className="report-ic" style={{ width: 64, height: 64, borderRadius: 'var(--radius-lg)' }}><Icon name="play" size={26} /></span>
          <h2 className="player-name">Ready when you are</h2>
          <p className="player-sub">{total} {total === 1 ? 'exercise' : 'exercises'}, about {items.reduce((a, e) => a + (e.durationMin || 3), 0)} minutes. I’ll guide each one. Go at your own pace.</p>
          <div className="player-foot"><Button variant="primary" size="lg" onClick={() => begin(initial.ex, initial.set)} iconRight={<Icon name="arrow-right" size={18} />}>Start session</Button></div>
        </div>
      )}

      {phase === 'work' && (
        <>
          <div className="player-body">
            <span className="player-step">Exercise {ex + 1} of {total} · Set {setIdx + 1} of {cur.sets}</span>
            <h2 className="player-name">{cur.name}</h2>
            <p className="player-sub">{cur.target}</p>
            <Ring animate={cur.type === 'hold'}>

            </div>
            {cur.cues && cur.cues.length > 0 && <div className="player-cues">{cur.cues.map((c, i) => <span key={i} className="cue"><Icon name="info" size={12} /> {c}</span>)}</div>}

          <span className="player-step">{cur.name} done</span>
          <h2 className="player-name">How did that feel?</h2>
          <p className="player-sub">This goes to your therapist, so they can fine-tune your plan.</p>

        </div>

    </div>
  );
}

function LibraryDrawer({ onClose, defaultArea }) {

          {list.length === 0 && <p className="muted" style={{ fontSize:'var(--text-sm)' }}>No exercises in this area yet.</p>}
          {list.map((e) => (

function Exercises() {

  const ptItems = ptPlan.map(resolve).filter(Boolean);

      if (fi >= 0) { arr.splice(fi, 1); const ti = arr.indexOf(toId); arr.splice(ti < 0 ? arr.length : ti, 0, from); setPlanOrder([...account.plan.filter((id) => ptSet.has(id)), ...arr]); }
    }

  const completed = items.filter(exDoneToday).length;
  const minutes = items.reduce((a, e) => a + (e.durationMin || 3), 0);
  const doneAll = total > 0 && completed === total;
  const alreadySent = account.sessions[iso] && account.sessions[iso].sent;

  const areaLabel = (AREAS.find((a) => a.key === injuryKey) || {}).label || '';

  const ping = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };
  const finish = () => {
    sendReport(iso, { completed, total, minutes, pain: pain == null ? 0 : pain, note: sessNote.trim() });

        </div>

        <Card padding="clamp(20px,3vw,32px)">
          <div className="card-head">
            <div>
              <div className="card-eyebrow"><Icon name="activity" size={14}/> {mental ? 'Today’s practice' : 'Today’s session'}</div>
              <h1 className="card-title" style={{ fontSize:'var(--text-2xl)' }}>{account.profile ? account.profile.injuryLabel : 'Your plan'}{mental ? '' : ' recovery'}</h1>
              <div className="session-meta">

          {total > 0 && !doneAll && (

            </Button>
          )}
          {total > 0 && (
            <div className="seg-progress" style={{ marginTop:16 }}>{items.map((e) => {
              const sd = progress[e.id] || 0; const d = sd >= e.sets; const p = Math.round((sd / e.sets) * 100);
              const bg = d ? 'var(--sage-500)' : sd > 0 ? `linear-gradient(90deg, var(--brand) ${p}%, var(--sand-200) ${p}%)` : 'var(--sand-200)';
              return <div key={e.id} title={e.name} style={{ background: bg }} />;

          )}
          {account.profile && account.profile.constraints && account.profile.constraints.length > 0 && (
            <div className="row" style={{ gap:8, flexWrap:'wrap', marginTop:16 }}>
              <span className="muted row" style={{ gap:6, fontSize:'var(--text-xs)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em' }}><Icon name="shield-check" size={13}/> Keeping in mind</span>
              {account.profile.constraints.map((c) => <span key={c} className="cue" style={{ color:'var(--apricot-800)', background:'var(--apricot-50)' }}>{c}</span>)}
            </div>
          )}
        </Card>

        {doneAll && alreadySent && (
          <div className="report-banner">
            <span className="report-ic"><Icon name="check" size={22}/></span>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:'var(--font-display)', fontWeight:700, color:'var(--text-strong)' }}>All done for today</div>
              <div className="muted" style={{ fontSize:'var(--text-sm)' }}>{account.mode === 'center' ? `Your check-in is on its way to ${account.center}.` : 'Saved to your progress. See it on your journey.'}</div>
            </div>
          </div>
        )}
        {doneAll && !alreadySent && (
          <Card>
            <div className="card-eyebrow" style={{ marginBottom:6 }}><Icon name="check-circle" size={14}/> {mental ? 'Nice — quick check-in' : 'Session complete — quick check-in'}</div>
            <h3 style={{ fontFamily:'var(--font-display)', margin:'0 0 4px', fontSize:'var(--text-xl)' }}>{mental ? 'How are you feeling now?' : 'How did your body feel today?'}</h3>
            <p className="muted" style={{ margin:'0 0 16px', fontSize:'var(--text-sm)' }}>{account.mode === 'center' ? `This goes to ${account.center} with your ${mental ? 'check-in' : 'session'}, your journal stays private.` : 'We’ll track this on your journey over time.'}</p>
            <div className="field-label" style={{ fontSize:'var(--text-sm)', marginBottom:10 }}>{mental ? 'How heavy does it feel right now?' : 'Pain level after these exercises'}</div>
            <div className="row" style={{ gap:6, flexWrap:'wrap' }}>
              {Array.from({ length: 11 }).map((_, n) => { const on = pain === n; const c = painColor(n); return (
                <button key={n} onClick={() => setPain(n)} aria-label={`${mental ? 'Level' : 'Pain'} ${n}`} style={{ width:38, height:38, borderRadius:'50%', border:`2px solid ${on ? c : 'var(--border)'}`, background: on ? c : 'var(--surface)', color: on ? '#fff' : 'var(--text-body)', fontWeight:700, fontSize:'var(--text-sm)', cursor:'pointer', transition:'all .15s' }}>{n}</button>
              ); })}
            </div>
            <div className="row" style={{ justifyContent:'space-between', marginTop:7 }}><span className="muted" style={{ fontSize:'var(--text-xs)' }}>{mental ? 'Light' : 'No pain'}</span><span className="muted" style={{ fontSize:'var(--text-xs)' }}>{mental ? 'Heavy' : 'Worst pain'}</span></div>
            <div className="field-label" style={{ fontSize:'var(--text-sm)', margin:'18px 0 8px' }}>{account.mode === 'center' ? 'A quick note for your PT' : 'A quick note to yourself'} <span className="muted" style={{ fontWeight:500 }}>(optional)</span></div>
            <Textarea value={sessNote} onChange={(e) => setSessNote(e.target.value)} placeholder={mental ? 'e.g. the breathing helped, still a bit wound up.' : 'e.g. Left knee twinged on the lunges, everything else felt good.'} rows={2} maxLength={400} />
            <Button variant="primary" full onClick={finish} disabled={pain == null} style={{ marginTop:14 }} iconRight={<Icon name="arrow-right" size={17}/>}>{account.mode === 'center' ? `Send check-in to ${account.center}` : (mental ? 'Save check-in' : 'Save session')}</Button>
            {pain == null && <p className="muted center" style={{ fontSize:'var(--text-xs)', margin:'10px 0 0' }}>Tap a {mental ? 'level' : 'pain level'} to {account.mode === 'center' ? 'send' : 'save'}.</p>}

        <div className="col" style={{ gap:14 }}>

                  : `Add ${itemP} that fit where you are. You can add anything, anytime.`}
              </p>
              <Button variant="primary" onClick={() => setDrawer(true)} iconLeft={<Icon name="plus" size={17}/>}>{mental ? 'Add practices' : 'Add exercises'}</Button>
            </Card>

          {items.map((e) => { const assigned = ptSet.has(e.id); return (
            <ExerciseCard key={e.id} ex={e} done={progress[e.id] || 0} assigned={assigned}

function WeekStrip({ journal, selected, onSelect }) {

  const days = Array.from({ length: 7 }).map((_, i) => addDays(t, i - 6));
  return (
    <div className="week-strip">
      {days.map((d) => {
        const iso = toISO(d); const e = journal[iso]; const sel = iso === selected;
        return (
          <button key={iso} className="week-day" data-active={sel ? 'true' : undefined} onClick={() => onSelect(iso)}>
            <span className="week-dow">{DOW[d.getDay()]}</span>
            <span className="week-dot" style={ e ? { background: moodColor(e.mood), borderColor: moodColor(e.mood), color:'#fff' } : {} }>{d.getDate()}</span>
          </button>
        );
      })}
    </div>
  );
}

  const [win, setWin] = useState(existing ? (existing.win || '') : '');
  const [text, setText] = useState(existing ? existing.text : '');
  const [photo, setPhoto] = useState(existing ? (existing.photo || '') : '');

            <div>
              <div className="card-eyebrow">{isToday ? <><Icon name="sun" size={14}/> Today’s page</> : <><Icon name="book-open" size={14}/> {existing ? 'Your entry' : 'A blank page'}</>}</div>
              <h1 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(2rem,4vw,var(--text-3xl))', margin:0, lineHeight:1.02 }}>{prettyDate(selected)}</h1>
              <div className="muted" style={{ marginTop:6, fontSize:'var(--text-md)' }}>{longDate(selected)}{isFuture ? ' · not here yet' : ''}</div>

          </div>

          {isFuture ? (
            <div className="center muted" style={{ padding:'40px 20px' }}><Icon name="clock" size={26} style={{ margin:'0 auto 12px' }}/><p style={{ maxWidth:360, margin:'0 auto' }}>This day hasn’t arrived yet. Come back when it does, your page will be waiting.</p></div>
          ) : (
            <>
              <div className="checkins">
                <div className="col" style={{ gap:14 }}><label className="field-label">How are you feeling?</label><MoodScale value={mood} onChange={setMood} labels={MOOD_LABELS} /></div>
                <div className="col" style={{ gap:14 }}><label className="field-label">And your pain today?</label><MoodScale value={pain} onChange={setPain} labels={PAIN_LABELS} /></div>

                    <Icon name="sun" size={22} style={{ color:'var(--brand)' }} />
                    <span style={{ fontSize:'var(--text-sm)', fontWeight:600, color:'var(--text-body)' }}>Add a photo from today</span>

                  {existing && !dirty && <span className="saved-tag"><Icon name="check" size={14}/> Saved</span>}
                  <Button variant="primary" disabled={!canSave || !dirty} iconLeft={<Icon name="check" size={17}/>} onClick={save}>{existing ? 'Update entry' : isToday ? 'Save today' : 'Save entry'}</Button>
                </div>
              </div>
            </>
          )}

function useIsPhone() {

  const [phone, setPhone] = useState(get);
  useEffect(() => { const on = () => setPhone(get()); window.addEventListener('resize', on); return () => window.removeEventListener('resize', on); }, []);
  return phone;
}
// Pain over time from the post-session check-ins (0–10). Lower is better, so a downward line = good.
function PainTrend({ sessions, mental }) {
  const isPhone = useIsPhone();
  const dates = Object.keys(sessions || {}).filter((d) => typeof sessions[d].pain === 'number').sort();
  if (dates.length < 2) return null;
  const byWeek = Math.round((today() - fromISO(dates[0])) / 86400000) >= 28;
  let pts, labels;
  if (byWeek) {
    const buckets = {};
    dates.forEach((d) => { const wk = Math.floor(Math.round((today() - fromISO(d)) / 86400000) / 7); (buckets[wk] = buckets[wk] || []).push(sessions[d].pain); });
    const weeks = Object.keys(buckets).map(Number).sort((a, b) => a - b).slice(0, 6).reverse();
    pts = weeks.map((wk) => buckets[wk].reduce((s, p) => s + p, 0) / buckets[wk].length);
    labels = weeks.map((wk) => wk === 0 ? 'This wk' : wk + 'w ago');
  } else {
    const days = dates.slice(-10);
    pts = days.map((d) => sessions[d].pain);
    labels = days.map((d) => d === todayISO() ? 'Today' : DOW[fromISO(d).getDay()]);
  }
  const delta = pts[pts.length - 1] - pts[0];
  const trendKey = delta <= -1 ? 'down' : delta >= 1 ? 'up' : 'steady';
  const TREND = {
    down: { icon: 'trending-down', label: mental ? 'Lifting' : 'Pain easing', color: '#6BA368', bg: 'color-mix(in srgb, #6BA368 12%, var(--surface))' },
    up: { icon: 'trending-up', label: mental ? 'Heavier' : 'Pain rising', color: '#D85C43', bg: 'color-mix(in srgb, #D85C43 12%, var(--surface))' },
    steady: { icon: 'activity', label: 'Holding steady', color: 'var(--text-muted)', bg: 'var(--surface-sunken)' },

  const area = `${line} L ${x(pts.length - 1).toFixed(1)} ${H - padY} L ${x(0).toFixed(1)} ${H - padY} Z`;

    <div>
      <div className="row" style={{ justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, gap: 8, flexWrap: 'wrap' }}>
        <span className="fb-badge" style={{ color: TREND.color, background: TREND.bg }}><Icon name={TREND.icon} size={14} /> {TREND.label}</span>
        <span className="muted" style={{ fontSize: 'var(--text-xs)', fontWeight: 600 }}>{byWeek ? 'by week' : 'by day'} · {mental ? '0 light → 10 heavy' : '0 none → 10 worst'}</span>
      </div>

        <defs><linearGradient id="paintrend" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#D85C43" stopOpacity="0.18" /><stop offset="100%" stopColor="#D85C43" stopOpacity="0" /></linearGradient></defs>
        {[0, 2, 4, 6, 8, 10].map((v) => <line key={v} x1={padX} x2={W - padX} y1={y(v)} y2={y(v)} stroke="var(--border)" strokeWidth="1" strokeDasharray="3 4" />)}
        <path d={area} fill="url(#paintrend)" />

        {P.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={ptR} fill="var(--surface)" stroke={painColor(Math.round(pts[i]))} strokeWidth="2.5" />)}

  const activeExercises = (ptPatient && ptPatient.plan ? ptPatient.plan.length : 0) + (account.plan ? account.plan.filter((id) => !(ptPatient && (ptPatient.plan || []).includes(id))).length : 0);

  const [badgesOpen, setBadgesOpen] = useState(false);

  const [prizeIn, setPrizeIn] = useState('');

  const dates = Object.keys(journal).sort();
  const total = dates.length;
  const moods = dates.map((d) => journal[d].mood);
  const avg = total ? Math.round((moods.reduce((a,b)=>a+b,0)/total) * 10) / 10 : 0;
  const good = moods.filter((m) => m >= 4).length;
  const streak = streakOf(journal);
  const best = bestStreakOf(journal);
  const sessionsLogged = Object.keys(account.sessions).length;
  const wins = dates.filter((d) => journal[d].win).sort((a,b)=>a<b?1:-1).slice(0,4).map((d)=>({ date:d, ...journal[d] }));
  const highlights = dates.filter((d) => journal[d].mood >= 4).sort((a,b)=>a<b?1:-1).slice(0,3).map((d)=>({ date:d, ...journal[d] }));

  // badges earned heuristically
  const earned = new Set();
  if (total >= 1) earned.add('first-step');
  if (best >= 3) earned.add('rhythm');
  if (best >= 7) earned.add('one-week');
  if (good >= 1) earned.add('brighter');
  if (wins.length >= 1) earned.add('worth-it');
  if (total >= 12) earned.add('on-the-rise');
  if (best >= 14) earned.add('two-weeks');
  if (best >= 30) earned.add('comeback');

  const TONE = { encouraging:{tone:'sage',accent:'var(--sage-400)',label:'Encouragement'}, cheer:{tone:'brand',accent:'var(--apricot-400)',label:'Cheering you on'}, helpful:{tone:'sky',accent:'var(--sky-400)',label:'A helpful note'} };

  return (
    <AppShell active="journey">
      <div className="shell">
        <div className="greeting">
          <span className="r-eyebrow">Your journey</span>
          <h2 className="greet-hello" style={{ marginTop:8 }}>{total === 0 ? 'Your story starts today.' : 'Look how far you’ve come.'}</h2>
          <p className="greet-line">{account.profile ? account.profile.injuryLabel + ' · ' : ''}{total === 0 ? 'No entries yet, your first check-in fills this in.' : `${total} entries logged · ${sessionsLogged} sessions done`}</p>

        <RoadBack milestones={roadMilestones} onUpdate={updateMilestones} injuryLabel={account.profile && account.profile.injuryLabel} mental={mental} />

        {!mental && (
          <Card variant="soft" className="center" padding="clamp(24px,5vw,36px)">
            <div style={{ fontSize:34, marginBottom:6 }}>🎉</div>
            <h3 style={{ fontFamily:'var(--font-display)', fontWeight:800, color:'var(--text-strong)', fontSize:'var(--text-xl)', margin:'0 0 6px' }}>Feeling recovered?</h3>
            <p className="muted" style={{ margin:'0 0 16px', maxWidth:'34ch', marginInline:'auto' }}>When your body is back, your recovery isn’t over, it just changes shape. Celebrate the milestone and keep going for your mind.</p>
            <Button variant="primary" size="lg" onClick={() => { celebrate(); setRecoveredOpen(true); }} iconLeft={<Icon name="check" size={18}/>}>I recovered</Button>
          </Card>
        )}

        {recoveredOpen && (
          <Modal onClose={() => setRecoveredOpen(false)}>
            <div className="center" style={{ padding:'4px 4px 8px' }}>
              <div style={{ fontSize:40, marginBottom:8 }}>🎉</div>

              <p className="muted" style={{ margin:'0 0 20px', lineHeight:1.6 }}>Recovering physically is huge. Recovery is never only physical though. Want to switch to mental wellness mode, so the app now supports your mind with breathing, grounding, journaling, and calmer daily check-ins?</p>

                <Button variant="primary" size="lg" full onClick={() => { setRecoveredOpen(false); switchToMentalMode(); go('/today'); }} iconLeft={<Icon name="leaf" size={18}/>}>Yes, switch to mental wellness</Button>

              </div>
            </div>
          </Modal>
        )}

              <div className="stat-card"><div className="stat-num">{graduated.length}</div><div className="stat-label">{mental ? 'tools mastered' : 'exercises graduated'}</div></div>

        {total === 0 && sessionsLogged === 0 && (
          <Card variant="soft" className="center" padding="clamp(28px,5vw,48px)">
            <span className="report-ic" style={{ margin:'0 auto 16px' }}><Icon name="sun" size={24}/></span>
            <h3 style={{ fontFamily:'var(--font-display)', margin:'0 0 8px', fontSize:'var(--text-xl)' }}>This is day one</h3>

            <div className="row" style={{ gap:12, justifyContent:'center', flexWrap:'wrap' }}>
              <Button variant="primary" onClick={() => go('/exercises')} iconRight={<Icon name="arrow-right" size={17}/>}>Start today’s session</Button>
              <Button variant="secondary" onClick={() => go('/journal')} iconLeft={<Icon name="feather" size={16}/>}>Open my journal</Button>
            </div>
          </Card>
        )}

        <div className="stat-grid">
          <div className="stat-card"><div className="row" style={{ gap:12 }}><span className="report-ic"><Icon name="flame" size={20}/></span><div><div className="stat-num">{streak}</div><div className="stat-label">day streak</div></div></div></div>

        </div>

        {total > 1 && (
          <div className="j-hero">
            <Card><div className="card-head" style={{ marginBottom:12 }}><div className="card-eyebrow"><Icon name="trending-up" size={14}/> Mood over time</div></div><MoodTrend journal={journal} /></Card>

          </div>
        )}

        {Object.keys(account.sessions || {}).filter((d) => typeof account.sessions[d].pain === 'number').length > 1 && (
          <Card><div className="card-head" style={{ marginBottom:12 }}><div className="card-eyebrow"><Icon name="activity" size={14}/> {mental ? 'How heavy it’s felt' : 'Pain over time'}</div></div><PainTrend sessions={account.sessions} mental={mental} /></Card>
        )}

        <PhotoTimeline journal={journal} />

        {account.goals && account.goals.length > 0 && (
          <Card>
            <div className="card-eyebrow" style={{ marginBottom:14 }}><Icon name="target" size={14}/> What you’re working toward</div>
            <div className="col" style={{ gap:10 }}>
              {account.goals.map((g) => (
                <div key={g.id} className="prize-row">
                  <button className="prize-check" data-done={g.done ? 'true' : undefined} onClick={() => toggleGoal(g.id)}>{g.done && <Icon name="check" size={16}/>}</button>
                  <span style={{ flex:1, color:'var(--text-strong)', fontWeight:500, textDecoration: g.done ? 'line-through' : 'none', opacity: g.done ? 0.6 : 1 }}>{g.text}</span>
                  {g.done && <Badge tone="sage" dot>Reached</Badge>}
                </div>
              ))}
            </div>
          </Card>
        )}

        <Card>
          <div className="card-eyebrow" style={{ marginBottom:6 }}><Icon name="gift" size={14}/> Rewards you set for yourself</div>
          <p className="muted" style={{ margin:'0 0 16px', fontSize:'var(--text-sm)' }}>Promise yourself a treat for a milestone. When you reach it, check it off, you earned it.</p>
          <div className="row" style={{ gap:10, flexWrap:'wrap', marginBottom:14 }}>
            <Input placeholder="When I… (e.g. hit a 7-day streak)" value={goalIn} onChange={(e)=>setGoalIn(e.target.value)} style={{ flex:2, minWidth:200 }} />
            <Input placeholder="I’ll… (e.g. a favorite coffee)" value={prizeIn} onChange={(e)=>setPrizeIn(e.target.value)} style={{ flex:2, minWidth:180 }} />
            <Button variant="secondary" disabled={!goalIn.trim() || !prizeIn.trim()} onClick={() => { addPrize(goalIn.trim(), prizeIn.trim()); setGoalIn(''); setPrizeIn(''); }} iconLeft={<Icon name="plus" size={16}/>}>Add</Button>
          </div>
          <div className="col" style={{ gap:10 }}>
            {(account.prizes || []).length === 0 && <p className="muted" style={{ margin:0, fontSize:'var(--text-sm)' }}>No rewards yet. Set one above, it’s a lovely way to stay motivated.</p>}
            {(account.prizes || []).map((p) => (
              <div key={p.id} className="prize-row">
                <button className="prize-check" data-done={p.done ? 'true' : undefined} onClick={() => togglePrize(p.id)}>{p.done ? <Icon name="check" size={16}/> : <Icon name="gift" size={15}/>}</button>
                <div style={{ flex:1 }}>
                  <div style={{ color:'var(--text-strong)', fontWeight:600, textDecoration: p.done ? 'line-through' : 'none', opacity: p.done ? 0.6 : 1 }}>{p.goal}</div>
                  <div className="muted" style={{ fontSize:'var(--text-sm)' }}>Reward: {p.prize}</div>
                </div>
                {p.done && <Badge tone="brand" dot>Earned</Badge>}
                <button className="icon-btn" onClick={() => removePrize(p.id)}><Icon name="x" size={15}/></button>
              </div>
            ))}
          </div>
        </Card>

        <Card>
          <button onClick={isPhone ? () => setBadgesOpen((o) => !o) : undefined}
            style={{ all:'unset', boxSizing:'border-box', width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', cursor: isPhone ? 'pointer' : 'default', marginBottom: (!isPhone || badgesOpen) ? 16 : 0 }}>
            <div className="card-eyebrow" style={{ margin:0 }}><Icon name="award" size={14}/> Badges{isPhone && <span className="muted" style={{ fontWeight:600, textTransform:'none', letterSpacing:'normal' }}> · {earned.size} of {BADGES.length} earned</span>}</div>
            {isPhone && <Icon name={badgesOpen ? 'chevron-down' : 'chevron-right'} size={18} style={{ color:'var(--text-subtle)' }} />}
          </button>
          {(!isPhone || badgesOpen) && <div className="badge-grid">{BADGES.map((b) => {
            const got = earned.has(b.id);
            const tones = { brand:'var(--grad-sunrise)', sage:'linear-gradient(145deg,#95C29B,#4F8E5C)', sky:'linear-gradient(145deg,#79BDCA,#38869A)' };
            return (
              <div key={b.id} className="badge-card" data-locked={got ? undefined : 'true'} title={b.desc}>
                <span className="badge-medal" style={{ background: got ? (tones[b.tone] || tones.brand) : 'var(--surface-sunken)', color: got ? '#fff' : 'var(--text-subtle)' }}><Icon name={got ? b.icon : 'lock'} size={26}/></span>
                <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'var(--text-base)', color:'var(--text-strong)' }}>{b.name}</div>
                <div className="muted" style={{ fontSize:'var(--text-xs)', marginTop:2 }}>{b.tag}</div>
              </div>
            );
          })}</div>}
        </Card>

        {wins.length > 0 && (
          <Card>
            <div className="card-eyebrow" style={{ marginBottom:16 }}><Icon name="sparkles" size={14}/> Small wins worth remembering</div>
            <div className="note-grid">{wins.map((w) => (
              <div key={w.date} className="highlight-card" style={{ borderLeftColor: moodColor(w.mood) }}>
                <div className="muted" style={{ fontSize:'var(--text-xs)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6 }}>{shortDate(w.date)}</div>
                <div style={{ color:'var(--text-strong)', fontWeight:600 }}>{w.win}</div>
              </div>
            ))}</div>
          </Card>
        )}

        {account.mode === 'center' && careNotes.length > 0 && (
          <Card>
            <div className="card-eyebrow" style={{ marginBottom:6, color:'var(--tertiary)' }}><Icon name="heart-handshake" size={14}/> From your care team</div>
            <h3 style={{ fontFamily:'var(--font-display)', margin:'0 0 4px', fontSize:'var(--text-xl)' }}>You’re not doing this alone</h3>
            <p className="muted" style={{ margin:'0 0 18px', fontSize:'var(--text-sm)' }}>Notes from the people cheering you on at {account.center}.</p>
            <div className="note-grid">{careNotes.map((n) => {
              const t = TONE[n.type] || TONE.encouraging;
              return (
                <div key={n.id} className="note-card" style={{ borderTop:`4px solid ${t.accent}` }}>
                  <div className="row" style={{ gap:12, marginBottom:14 }}><Avatar name={n.from} size="md" ring /><div style={{ flex:1 }}><div style={{ fontWeight:700, color:'var(--text-strong)' }}>{n.from}</div><div className="muted" style={{ fontSize:'var(--text-xs)' }}>{n.role}</div></div><span style={{ color:t.accent, opacity:0.85 }}><Icon name="quote" size={20}/></span></div>
                  <p style={{ margin:0, fontSize:'var(--text-md)', lineHeight:1.6, color:'var(--text-body)' }}>{n.text}</p>
                  <div className="row" style={{ justifyContent:'space-between', marginTop:16 }}><span style={{ fontSize:'var(--text-xs)', fontWeight:700, color:t.accent, textTransform:'uppercase', letterSpacing:'0.08em' }}>{t.label}</span><span className="muted" style={{ fontSize:'var(--text-xs)' }}>{shortDate(n.dateISO)}</span></div>
                </div>
              );
            })}</div>
          </Card>
        )}
      </div>
    </AppShell>
  );
}

// Inline editable text field: local state, saves on blur (no focus loss while typing).
function EditText({ value, onSave, placeholder }) {
  const [v, setV] = useState(value || '');
  useEffect(() => { setV(value || ''); }, [value]);
  return <Input value={v} placeholder={placeholder} onChange={(e) => setV(e.target.value)} onBlur={() => { if (v.trim() !== (value || '')) onSave(v.trim()); }} />;
}

function CustomExerciseForm({ onSave, onCancel }) {
  const [name, setName] = useState('');
  const [target, setTarget] = useState('');
  const [type, setType] = useState('reps');
  const [sets, setSets] = useState(3);
  const [reps, setReps] = useState(10);
  const [hold, setHold] = useState(20);
  const [perDay, setPerDay] = useState(1);
  const [instructions, setInstructions] = useState('');
  const [videoUrl, setVideoUrl] = useState('');
  const save = () => {
    if (!name.trim()) return;
    const steps = instructions.split('\n').map((s) => s.trim()).filter(Boolean);
    onSave({ name: name.trim(), target: target.trim() || 'Custom', area: 'custom', thumb: 'mobility', type,
      sets: Number(sets) || 3, reps: Number(reps) || 10, holdSec: Number(hold) || 20, restSec: 40, durationMin: 3, level: 'Assigned',
      timesPerDay: Math.max(1, Math.min(6, Number(perDay) || 1)),
      summary: steps[0] || 'Assigned by your therapist.', steps: steps.length ? steps : ['Follow your therapist’s guidance.'], cues: [], videoUrl: videoUrl.trim() });
  };
  return (
    <div style={{ background: 'var(--surface-sunken)', borderRadius: 'var(--radius-md)', padding: 16, marginBottom: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
      <div className="row" style={{ gap: 10, flexWrap: 'wrap' }}>
        <Input label="Exercise name" placeholder="e.g. Doorway pec stretch" value={name} onChange={(e) => setName(e.target.value)} style={{ flex: 2, minWidth: 200 }} />
        <Input label="Target area" placeholder="e.g. Chest & shoulder" value={target} onChange={(e) => setTarget(e.target.value)} style={{ flex: 1, minWidth: 140 }} />
      </div>
      <div className="row" style={{ gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <div><div className="field-label" style={{ fontSize: 'var(--text-sm)', marginBottom: 6 }}>Type</div><div className="row" style={{ gap: 6 }}>{[['reps', 'Reps'], ['hold', 'Hold']].map(([v, l]) => <button key={v} className="chip" data-on={type === v} onClick={() => setType(v)} style={{ fontSize: 'var(--text-xs)', padding: '8px 14px' }}>{l}</button>)}</div></div>
        <Input label="Sets" type="number" value={sets} onChange={(e) => setSets(e.target.value)} style={{ width: 88 }} />
        {type === 'reps' ? <Input label="Reps" type="number" value={reps} onChange={(e) => setReps(e.target.value)} style={{ width: 88 }} /> : <Input label="Hold (sec)" type="number" value={hold} onChange={(e) => setHold(e.target.value)} style={{ width: 110 }} />}
        <Input label="Times a day" type="number" min="1" max="6" value={perDay} onChange={(e) => setPerDay(e.target.value)} style={{ width: 110 }} />
      </div>
      <Textarea label="How to do it (one step per line)" rows={3} value={instructions} onChange={(e) => setInstructions(e.target.value)} placeholder={'Stand in a doorway, forearm on the frame.\nGently lean forward until you feel a stretch.\nHold and breathe, then switch.'} />
      <Input label="Video link (optional)" iconLeft={<Icon name="play" size={15} />} placeholder="YouTube or any how-to link" value={videoUrl} onChange={(e) => setVideoUrl(e.target.value)} />
      <div className="row" style={{ gap: 10, justifyContent: 'flex-end' }}>
        <Button variant="ghost" size="sm" onClick={onCancel}>Cancel</Button>
        <Button variant="primary" size="sm" disabled={!name.trim()} onClick={save} iconLeft={<Icon name="check" size={15} />}>Add to plan</Button>
      </div>
    </div>
  );
}

// PT-facing weekly digest of the patient's post-session pain ratings + notes.
function WeeklyCheckin({ p }) {
  const reports = (p.reports || []).slice().sort((a, b) => (a.dateISO < b.dateISO ? 1 : -1));
  if (!reports.length) return null;
  const wkStart = daysAgoISO(6);
  const wk = reports.filter((r) => r.dateISO >= wkStart);
  const pains = wk.filter((r) => typeof r.pain === 'number').map((r) => r.pain);
  const avgPain = pains.length ? Math.round((pains.reduce((a, b) => a + b, 0) / pains.length) * 10) / 10 : null;
  const notes = wk.filter((r) => r.note && r.note.trim());
  const prevStart = daysAgoISO(13);
  const prev = reports.filter((r) => r.dateISO >= prevStart && r.dateISO < wkStart);
  const prevPains = prev.filter((r) => typeof r.pain === 'number').map((r) => r.pain);
  const prevAvg = prevPains.length ? prevPains.reduce((a, b) => a + b, 0) / prevPains.length : null;
  const trend = (avgPain != null && prevAvg != null) ? (avgPain < prevAvg - 0.3 ? 'down' : avgPain > prevAvg + 0.3 ? 'up' : 'flat') : null;
  const useWk = wk.length ? wk : reports.slice(0, 5);
  return (
    <Card>
      <div className="card-eyebrow" style={{ marginBottom: 14 }}><Icon name="activity" size={14} /> Weekly check-in <span className="muted" style={{ fontWeight: 500, textTransform: 'none', letterSpacing: 0 }}>· {wk.length ? 'last 7 days' : 'recent'}</span></div>
      <div className="stat-grid" style={{ marginBottom: notes.length ? 18 : 0 }}>
        <div className="stat-card"><div className="stat-num">{useWk.length}</div><div className="stat-label">sessions</div></div>
        <div className="stat-card"><div className="stat-num" style={{ color: avgPain == null ? 'var(--text-subtle)' : painColor(Math.round(avgPain)) }}>{avgPain == null ? '—' : avgPain}</div><div className="stat-label">avg pain /10</div></div>
        <div className="stat-card"><div className="row" style={{ gap: 6, alignItems: 'center' }}>{trend === 'down' && <Icon name="trending-down" size={18} style={{ color: '#6BA368' }} />}{trend === 'up' && <Icon name="trending-up" size={18} style={{ color: '#D85C43' }} />}<div className="stat-num" style={{ fontSize: 'var(--text-md)' }}>{trend === 'down' ? 'Easing' : trend === 'up' ? 'Rising' : trend === 'flat' ? 'Steady' : '—'}</div></div><div className="stat-label">pain trend</div></div>
      </div>
      {notes.length > 0 && (
        <div className="col" style={{ gap: 10 }}>
          <div className="muted" style={{ fontSize: 'var(--text-xs)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Their notes this week</div>
          {notes.map((r, i) => (
            <div key={i} className="row" style={{ gap: 10, alignItems: 'flex-start', padding: '10px 12px', borderRadius: 'var(--radius-md)', background: 'var(--sky-50)', border: '1px solid var(--sky-100)' }}>
              <span className="fb-badge" style={{ color: painColor(r.pain), background: `color-mix(in srgb, ${painColor(r.pain)} 14%, var(--surface))`, flex: '0 0 auto' }}>pain {r.pain}</span>
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ color: 'var(--text-body)', fontSize: 'var(--text-sm)' }}>“{r.note}”</div><div className="muted" style={{ fontSize: 'var(--text-xs)', marginTop: 2 }}>{shortDate(r.dateISO)} · {r.completed}/{r.total} exercises</div></div>
            </div>
          ))}
        </div>
      )}
      {notes.length === 0 && <p className="muted" style={{ margin: 0, fontSize: 'var(--text-sm)' }}>No notes left this week. Pain ratings come in with each completed session.</p>}
    </Card>
  );
}

function TherapistDashboard() {
  const { account, link, refreshLink, signOut, ptAssignExercise, ptUnassignExercise, ptAddCustomExercise, ptAddNote, ptRemoveNote, ptSetVideo, ptReply, ptSetMilestones, ptGraduateExercise, setReportPref } = useStore();
  const patients = (link && link.patients) ? Object.values(link.patients) : [];
  const [selUid, setSelUid] = useState(patients[0] ? patients[0].uid : null);
  const [toast, setToast] = useState(null);
  const sel = patients.find((p) => p.uid === selUid) || patients[0] || null;
  const ptApi = { ptAssignExercise, ptUnassignExercise, ptAddCustomExercise, ptAddNote, ptRemoveNote, ptSetVideo, ptReply, ptSetMilestones, ptGraduateExercise };
  const reportPref = account.reportPref || 'concerns';
  // Pull together the exercises patients flagged as too easy / tough / painful, for the "needs attention" view.
  const CONCERN = new Set(['easy', 'hard', 'hurt']);
  const flags = reportPref === 'off' ? [] : patients.flatMap((pt) => {
    const exMap = { ...EXERCISES, ...(pt.customEx || {}) };
    return Object.entries(pt.feedback || {})
      .filter(([, fb]) => reportPref === 'all' ? true : CONCERN.has(fb.rating))
      .map(([exId, fb]) => ({ patient: pt, ex: exMap[exId], fb }))
      .filter((x) => x.ex);
  });
  // Post-session check-ins worth surfacing: high pain ('concerns') or any pain/note ('all'), newest first.
  const recentStart = daysAgoISO(9);
  const painFlags = reportPref === 'off' ? [] : patients.flatMap((pt) =>
    (pt.reports || [])
      .filter((r) => r.dateISO >= recentStart && typeof r.pain === 'number' && (reportPref === 'all' ? (r.pain >= 4 || (r.note && r.note.trim())) : r.pain >= 6))
      .map((r) => ({ patient: pt, report: r }))
  ).sort((a, b) => (a.report.dateISO < b.report.dateISO ? 1 : -1)).slice(0, 8);

  // Adherence: how recently each patient logged exercises, so the PT knows who to nudge.
  const adherence = patients.map((pt) => {
    const reps = (pt.reports || []).map((r) => r.dateISO).sort();
    const lastISO = reps.length ? reps[reps.length - 1] : (pt.lastReport && pt.lastReport.dateISO) || null;
    const days = daysSinceISO(lastISO);
    const wk = (pt.reports || []).filter((r) => r.dateISO >= daysAgoISO(6)).length;
    const status = days == null ? 'none' : days <= 1 ? 'ontrack' : days <= 4 ? 'slowing' : 'nudge';
    return { pt, lastISO, days, wk, status };
  }).sort((a, b) => { const rank = { nudge: 0, none: 1, slowing: 2, ontrack: 3 }; if (rank[a.status] !== rank[b.status]) return rank[a.status] - rank[b.status]; return (b.days || 0) - (a.days || 0); });
  const needNudge = adherence.filter((x) => x.status === 'nudge' || x.status === 'none').length;
  const ADH = { ontrack: { label: 'On track', color: '#6BA368', tone: 'sage' }, slowing: { label: 'Slowing down', color: '#E0A33E', tone: 'amber' }, nudge: { label: 'Needs a nudge', color: '#D85C43', tone: 'brand' }, none: { label: 'No sessions yet', color: 'var(--text-subtle)', tone: 'sky' } };

  useEffect(() => { refreshLink(); }, []);

    <div className="app-shell">
      <header className="topbar">
        <div className="row" style={{ gap: 12 }}><Logo size={26} /><Badge tone="sky" dot>Therapist</Badge></div>
        <div className="topbar-right">
          <span className="muted" style={{ fontWeight: 600, fontSize: 'var(--text-sm)' }}>{account.clinic}</span>
          <Button variant="ghost" size="sm" onClick={() => signOut()} iconLeft={<Icon name="log-out" size={16} />}>Sign out</Button>
        </div>
      </header>
      <main className="app-main">
        <div className="shell">
          <div className="greeting">
            <span className="r-eyebrow">Clinic dashboard</span>
            <h2 className="greet-hello" style={{ marginTop: 8 }}>Hi, {(account.name || 'there').replace(/^(Dr|Mr|Ms|Mrs)\.?\s+/i, '').split(' ')[0]}.</h2>
            <p className="greet-line">{patients.length} {patients.length === 1 ? 'patient' : 'patients'} connected · {account.clinic}</p>
          </div>

          <div className="pt-code-card">
            <div>
              <div className="card-eyebrow" style={{ marginBottom: 10 }}><Icon name="key" size={14} /> Your clinic code</div>
              <div className="row" style={{ gap: 12, flexWrap: 'wrap' }}>
                <span className="pt-code">{account.code}</span>
                <Button variant="secondary" size="sm" onClick={copyCode} iconLeft={<Icon name="clipboard" size={15} />}>Copy</Button>
              </div>
              <p className="muted" style={{ margin: '12px 0 0', fontSize: 'var(--text-sm)', maxWidth: '48ch' }}>Give this to a patient. When they enter it at sign-up, or in their profile, they connect to you here, and your exercises and notes show up on their app.</p>
            </div>
            <span className="report-ic" style={{ width: 64, height: 64, borderRadius: 'var(--radius-lg)' }}><Icon name="heart-handshake" size={28} /></span>
          </div>

          <Card>
            <div className="row" style={{ justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', alignItems: 'center' }}>
              <div>
                <div className="card-eyebrow" style={{ margin: 0 }}><Icon name="bell" size={14} /> Feedback & check-in reports</div>
                <p className="muted" style={{ margin: '6px 0 0', fontSize: 'var(--text-sm)', maxWidth: '52ch' }}>Choose how much you hear: per-exercise feedback (too easy, tough, painful) and the post-session pain check-ins your patients leave.</p>
              </div>
              <div className="row" style={{ gap: 6, flexWrap: 'wrap' }}>
                {[['all', 'All feedback'], ['concerns', 'Only concerns'], ['off', 'Off']].map(([v, l]) => (
                  <button key={v} className="chip" data-on={reportPref === v} onClick={() => setReportPref(v)} style={{ fontSize: 'var(--text-xs)', padding: '8px 14px' }}>{l}</button>
                ))}
              </div>
            </div>
          </Card>

          {flags.length > 0 && (
            <Card style={{ borderColor: 'var(--apricot-200)', background: 'var(--surface-brand)' }}>
              <div className="card-eyebrow" style={{ marginBottom: 12, color: 'var(--brand-soft-text)' }}><Icon name="info" size={14} /> Worth a look ({flags.length})</div>

                  <button key={i} className="pt-ex-row" style={{ textAlign: 'left', cursor: 'pointer', width: '100%' }} onClick={() => setSelUid(x.patient.uid)}>
                    <span className="fb-badge" style={{ color: f.color, background: `color-mix(in srgb, ${f.color} 14%, var(--surface))`, flex: '0 0 auto' }}><Icon name={f.icon} size={12} /> {f.label}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>

                    <span className="fb-badge" style={{ color: painColor(x.report.pain), background: `color-mix(in srgb, ${painColor(x.report.pain)} 14%, var(--surface))`, flex: '0 0 auto' }}>pain {x.report.pain}/10</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, color: 'var(--text-strong)', fontSize: 'var(--text-sm)' }}>{x.patient.name || 'Patient'}</div>

                    <Icon name="chevron-right" size={16} style={{ color: 'var(--text-subtle)', flex: '0 0 auto' }} />
                  </button>
                ))}
              </div>
            </Card>
          )}

          {patients.length > 0 && (
            <Card>
              <div className="card-eyebrow" style={{ marginBottom: 6 }}><Icon name="signal" size={14} /> Who needs a nudge</div>
              <p className="muted" style={{ margin: '0 0 16px', fontSize: 'var(--text-sm)' }}>{needNudge > 0 ? `${needNudge} ${needNudge === 1 ? 'patient hasn’t' : 'patients haven’t'} logged exercises in a while — a quick message goes a long way.` : 'Everyone’s been keeping up. Nice work.'}</p>

        {d.sections.map((s, i) => (
          <div key={i} style={{ marginBottom: 22 }}>
            <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'var(--text-lg)', color: 'var(--text-strong)', margin: '0 0 8px' }}>{s.h}</h2>
            {s.p && <p style={{ color: 'var(--text-body)', lineHeight: 1.65, margin: 0 }}>{s.p}</p>}
            {s.list && <ul style={{ color: 'var(--text-body)', lineHeight: 1.6, margin: 0, paddingLeft: 20 }}>{s.list.map((li, j) => <li key={j} style={{ marginBottom: 6 }}>{li}</li>)}</ul>}
          </div>
        ))}
      </div>
    </div>
  );
}
// Full-screen, app-style welcome for the phone (no top bar; clears the status bar).
function NativeLanding() {
  const primaryBtn = { width:'100%', height:56, border:'none', borderRadius:'var(--radius-pill)', background:'#fff', color:'var(--apricot-700)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'var(--text-lg)', cursor:'pointer' };
  const ghostBtn = { width:'100%', height:56, borderRadius:'var(--radius-pill)', background:'rgba(255,255,255,0.14)', color:'#fff', border:'1.5px solid rgba(255,255,255,0.6)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'var(--text-base)', cursor:'pointer' };
  return (
    <div style={{ minHeight:'100dvh', display:'flex', flexDirection:'column', background:'var(--grad-sunrise)', color:'#fff',
      paddingTop:'calc(env(safe-area-inset-top) + 44px)', paddingBottom:'calc(env(safe-area-inset-bottom) + 26px)', paddingLeft:28, paddingRight:28, overflow:'hidden' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:18 }}>
        <Logo variant="mark" tone="white" size={52} />
        <h1 style={{ color:'#fff', fontFamily:'var(--font-display)', fontWeight:800, fontSize:'clamp(2.5rem,10vw,3.4rem)', lineHeight:1.04, letterSpacing:'-0.02em', margin:0, maxWidth:'13ch' }}>Recovery that stays with you.</h1>
        <p style={{ fontSize:'var(--text-lg)', opacity:0.94, fontWeight:500, maxWidth:'24ch', lineHeight:1.4, margin:0 }}>Your exercises, your check-ins, and a private space for your body and your mind.</p>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <button onClick={() => go('/signup')} style={primaryBtn}>Get started</button>
        <button onClick={() => go('/join')} style={ghostBtn}>I have a clinic code</button>
        <div className="center" style={{ marginTop:8, fontSize:'var(--text-base)' }}>
          <span style={{ opacity:0.92 }}>Already have an account? </span>
          <span onClick={() => go('/login')} style={{ fontWeight:800, textDecoration:'underline', cursor:'pointer' }}>Sign in</span>
        </div>
        <div className="center" style={{ marginTop:2 }}>
          <span onClick={() => go('/pt-signup')} style={{ fontSize:'var(--text-sm)', opacity:0.85, textDecoration:'underline', cursor:'pointer' }}>I’m a physical therapist</span>
        </div>
      </div>
    </div>
  );
}
function App() {
  const { account, session, authReady } = useStore();
  const route = useRoute();
  const loggedIn = session && !!account;

  useEffect(() => { window.scrollTo(0, 0); }, [route]);

  // Wait for the auth check (restoring a logged-in session) before deciding what to show.
  if (!authReady) return <FullLoader />;

  // Legal pages, reachable whether signed in or out.
  if (route === '/privacy') return <LegalPage doc="privacy" />;
  if (route === '/terms') return <LegalPage doc="terms" />;

  // Logged out
  if (!loggedIn) {
    if (route === '/login') return <Auth kind="login" />;
    if (route === '/signup') return <Auth kind="signup" />;
    if (route === '/join') return <Auth kind="join" />;
    if (route === '/pt-signup') return <Auth kind="therapist" />;
    // Phone gets the simple app-style welcome; the web keeps the full marketing landing.
    return isNative() ? <NativeLanding /> : <Landing />;
  }
  // Therapists only ever see their dashboard.
  if (account.role === 'therapist') return <TherapistDashboard />;
  // Logged in but not onboarded
  if (!account.onboarded) return <Onboarding />;
  // Logged in app
  if (route === '/exercises') return <Exercises />;
  if (route === '/journal') return <Journal />;
  if (route === '/journey') return <Journey />;
  if (route === '/messages') return account.mode === 'center' ? <Messages /> : <Home />;
  if (route === '/profile') return <Profile />;
  return <Home />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <StoreProvider><App /></StoreProvider>
);
window.addEventListener('load', () => setTimeout(() => { const s = document.getElementById('splash'); if (s) s.classList.add('hide'); }, 300));
setTimeout(() => { const s = document.getElementById('splash'); if (s) s.classList.add('hide'); }, 1500);
// Register the service worker so the app is installable and works offline.
// Skipped on file:// (only works when served over http/https).
if ('serviceWorker' in navigator && location.protocol.startsWith('http') && !isNative()) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>

  .r-btn[data-variant="primary"]:not(:disabled):active{background:var(--brand-active);}
  .r-btn[data-variant="secondary"]:not(:disabled):hover{border-color:var(--border-brand);}
  .r-btn[data-variant="ghost"]:not(:disabled):hover{background:var(--brand-soft);}
  .r-btn[data-variant="soft"]:not(:disabled):hover{background:var(--apricot-200);}
  .r-btn:focus-visible{outline:none; box-shadow:var(--focus-ring);}
  .r-input::placeholder,.r-textarea::placeholder{color:var(--text-subtle);}

  /* iOS renders inputs with its own metrics that vertically clip the text in a
     fixed-height box; reset that so typed text + placeholders aren't cut off. */
  .r-input,.r-textarea{-webkit-appearance:none; appearance:none; line-height:normal; box-sizing:border-box;}
  .r-input{line-height:1.2;}
  .r-mood:hover span:first-child{border-color:var(--border-brand);}

  .r-card--hover:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg);}
</style>
